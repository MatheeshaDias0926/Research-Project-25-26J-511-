[platformio]
src_dir = .
default_envs = data_collection

; ============================================================
; Environment: Data Collection (Camera Streaming)
; Usage: pio run -e data_collection -t upload
; ============================================================
[env:data_collection]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
; Select only the Data_Collection source files
build_src_filter = +<Data_Collection/src/> -<Inference/src/>

; Library dependencies
lib_deps =
    esp32-camera

; Partitions (Huge app needed for OTA/Camera buffers)
board_build.partitions = huge_app.csv

; ============================================================
; Environment: Inference (Running the AI)
; Usage: pio run -e inference -t upload
; ============================================================
[env:inference]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
; Select only the Inference source files
build_src_filter = +<Inference/src/> -<Data_Collection/src/>

; Library dependencies
lib_deps =
    esp32-camera
    bblanchon/ArduinoJson @ 6.21.3
    ; TODO: You will add your Edge Impulse library here later
    ; e.g., your_project_name_inferencing

; Partitions (Huge app needed for AI model)
board_build.partitions = huge_app.csv
